<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>github issue tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-base-200 overflow-x-hidden">
    <section class="flex h-screen items-center hidden" id="login">
      <fieldset
        class="fieldset bg-white border rounded-box w-full max-w-sm mx-auto p-6"
      >
        <div class="form-details text-center">
          <img src="./assets/github-logo.png" class="flex mx-auto" alt="" />
          <h1 class="text-2xl font-bold">Github issue tracker</h1>
          <p class="text-gray-500">Sign in to manage your issues</p>
        </div>

        <label class="label font-bold">UserName</label>
        <input type="name" class="input" placeholder="username" id="userName" />
        <p class="font-bold text-blue-500">default:admin</p>

        <label class="label font-bold">Password</label>
        <input
          type="password"
          class="input"
          placeholder="Password"
          id="password"
        />
        <p class="font-bold text-blue-500">default:admin123</p>

        <button type="submit" class="btn btn-primary mt-4" id="submit">
          Login
        </button>
      </fieldset>
    </section>
    <section id="github" class="">
      <header>
        <div class="navbar bg-base-100 shadow-sm flex-wrap gap-2">
          <div class="flex items-center gap-2 flex-1">
            <img src="./assets/github-logo.png" class="w-10 sm:w-14" />
            <span class="text-lg sm:text-2xl font-bold hidden sm:block">
              Github Issue Tracker
            </span>
          </div>

          <div
            class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto hidden lg:block"
          >
            <!-- Search -->
            <div class="flex w-full sm:w-auto gap-2">
              <input
                type="search"
                placeholder="Search..."
                id="search-input"
                class="input w-full sm:w-48"
              />
              <button class="btn btn-primary w-24 sm:w-auto" id="search">
                Search
              </button>
            </div>

            <!-- Dropdown -->
            <div class="dropdown dropdown-end lg:hidden">
              <div tabindex="0" role="button" class="btn btn-ghost">☰</div>
              <ul
                class="menu menu-sm dropdown-content bg-base-100 rounded-box w-40 mt-2 shadow"
              >
                <li><a>Logout</a></li>
              </ul>
            </div>
          </div>
        </div>
      </header>
      <section class="github-container w-full max-w-7xl mx-auto px-3 sm:px-5">
        <div class="github">
          <div
            class="flex flex-col sm:flex-row gap-2 bg-white p-4 my-2 rounded"
          >
            <button class="btn btn-primary w-full sm:w-30" id="all">All</button>
            <button class="btn w-full sm:w-30" id="open">Open</button>
            <button class="btn w-full sm:w-30" id="closed">Closed</button>
          </div>
          <div
            class="github-header flex justify-between items-center bg-white p-4 my-2 rounded"
          >
            <div class="flex gap-1 items-center">
              <div class="bg-base-200 rounded-full p-4">
                <img src="./assets/Aperture.png" alt="" />
              </div>
              <div>
                <h6 class="font-bold text-2xl" id="total-issue"></h6>
                <p class="text-gray-400">
                  track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex gap-2">
              <div class="flex items-center gap-1">
                <div class="w-3 h-3 rounded-full bg-green-600"></div>
                <span>open</span>
              </div>
              <div class="flex items-center gap-1">
                <div class="w-3 h-3 rounded-full bg-violet-600"></div>
                <span>closed</span>
              </div>
            </div>
          </div>
        </div>
        <!-- Loader -->
        <div id="loader" class="hidden flex justify-center my-10">
          <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center my-10 text-gray-500">
          <p class="text-lg font-semibold">No issues found 😕</p>
          <p class="text-sm">Try a different search or filter</p>
        </div>
        <!-- all issues -->

        <div
          id="all-issues"
          class="grid gap-4 grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"
        >
          >
        </div>
      </section>
    </section>
    <!-- modal -->
    <dialog id="issue_modal" class="modal">
      <div class="modal-box p-0 bg-base-100 w-11/12 max-w-2xl relative">
        <button
          id="close-modal"
          class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 z-10"
        >
          ✕
        </button>

        <div id="modal-content"></div>
      </div>

      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>
  </body>
  <script src="./login.js"></script>
  <script src="./github-issue.js"></script>
</html>
